<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>星轨穿梭</title>
  <link rel="stylesheet" href="./css/style.css?v=ui39">
  <script>
    (function () {
      try {
        var c = document.createElement('canvas');
        var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
        if (!gl) {
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-size:18px;text-align:center;padding:20px;background:#000;font-family:sans-serif;">当前浏览器不支持 3D 渲染<br><br>请使用抖音 App 扫码体验</div>';
        }
      } catch (e) {
        document.body.innerHTML = '<div style="color:#fff;text-align:center;padding-top:40vh;font-family:sans-serif;">出错了，请重启后再试</div>';
      }
    })();
  </script>
</head>

    <canvas id="game-canvas"></canvas>

    <div id="screen-overlay"></div>

</html>
